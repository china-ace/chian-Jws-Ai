version: '3.8'

services:
  trading-bot:
    build: .
    ports:
      - "8000:8000"
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./portfolio.json:/app/portfolio.json
    restart: unless-stopped

